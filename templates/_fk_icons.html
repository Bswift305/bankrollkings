{# Shared line-icon set for Franchise Kings — monochrome, inherits currentColor
   so it picks up each card header's text colour. Import with:
   {% from "_fk_icons.html" import icon %}  then  {{ icon('ops') }} #}
{%- macro icon(name, size=15) -%}
<svg class="fk-ic" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px;margin-right:6px;flex:0 0 auto">
{%- if name == 'ops' -%}<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill="currentColor" stroke="none"/>
{%- elif name == 'owner' -%}<path d="M3 21h18"/><path d="M5 21V10l7-5 7 5v11"/><path d="M5 10h14"/><path d="M9.5 21v-5h5v5"/>
{%- elif name == 'alert' -%}<path d="M10.3 4 2 18.5a2 2 0 0 0 1.7 3h16.6a2 2 0 0 0 1.7-3L13.7 4a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="10" x2="12" y2="14"/><line x1="12" y1="17.5" x2="12" y2="17.5"/>
{%- elif name == 'bulb' -%}<path d="M9.5 18h5"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.4 1 2.2V16h6v-.3c0-.8.4-1.6 1-2.2A6 6 0 0 0 12 3Z"/>
{%- elif name == 'trophy' -%}<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0Z"/><path d="M7 6H4v2a3 3 0 0 0 3 3"/><path d="M17 6h3v2a3 3 0 0 1-3 3"/>
{%- elif name == 'star' -%}<path d="M12 3l2.6 5.3 5.8.9-4.2 4.1 1 5.8L12 16.9 6.8 19l1-5.8-4.2-4.1 5.8-.9Z"/>
{%- elif name == 'book' -%}<path d="M5 4h12a1 1 0 0 1 1 1v15H6a2 2 0 0 0-2 2V6a2 2 0 0 1 2-2Z"/><path d="M4 20a2 2 0 0 0 2 2h12"/>
{%- elif name == 'scroll' -%}<path d="M6 5h11v13a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7"/><path d="M17 5a2 2 0 0 1 2 2v2h-2"/><line x1="8" y1="10" x2="14" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/>
{%- elif name == 'swap' -%}<path d="M7 4 3 8l4 4"/><path d="M3 8h13"/><path d="M17 20l4-4-4-4"/><path d="M21 16H8"/>
{%- elif name == 'chart' -%}<path d="M4 4v16h16"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>
{%- elif name == 'trend' -%}<path d="M4 4v16h16"/><path d="M7 15l4-4 3 3 5-6"/><path d="M16 8h3v3"/>
{%- elif name == 'mic' -%}<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="9" y1="21" x2="15" y2="21"/>
{%- elif name == 'news' -%}<path d="M4 6h13v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M17 9h3v9a2 2 0 0 1-2 2"/><line x1="7" y1="9" x2="14" y2="9"/><line x1="7" y1="13" x2="14" y2="13"/><line x1="7" y1="17" x2="11" y2="17"/>
{%- elif name == 'users' -%}<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5a3.4 3.4 0 0 1 0 6.8"/><path d="M18.5 20a5.5 5.5 0 0 0-3-4.9"/>
{%- elif name == 'pen' -%}<path d="M4 20h4L20 8a2.8 2.8 0 0 0-4-4L4 16Z"/><line x1="14.5" y1="6" x2="18" y2="9.5"/>
{%- elif name == 'ball' -%}<ellipse cx="12" cy="12" rx="9" ry="5.5" transform="rotate(-30 12 12)"/><line x1="9.5" y1="11" x2="14.5" y2="13"/><line x1="11" y1="9.5" x2="12" y2="11"/><line x1="13" y1="13" x2="14" y2="14.5"/>
{%- elif name == 'tv' -%}<rect x="3" y="6" width="18" height="12" rx="2"/><path d="M8 21h8"/><path d="M12 18v3"/>
{%- elif name == 'search' -%}<circle cx="11" cy="11" r="7"/><line x1="16" y1="16" x2="21" y2="21"/>
{%- elif name == 'flag' -%}<path d="M5 21V4"/><path d="M5 5h11l-2 3 2 3H5"/>
{%- elif name == 'cap' -%}<path d="M3 9l9-5 9 5-9 5Z"/><path d="M7 11v5c0 1 2.2 2.5 5 2.5s5-1.5 5-2.5v-5"/>
{%- endif -%}
</svg>
{%- endmacro -%}
