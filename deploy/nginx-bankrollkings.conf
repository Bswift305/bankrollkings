# Nginx site config for bankrollkings.com
# Reverse proxy in front of gunicorn (127.0.0.1:8000), TLS termination,
# www -> apex redirect, static files served directly by Nginx.
#
# Install:
#   sudo cp deploy/nginx-bankrollkings.conf /etc/nginx/sites-available/bankrollkings
#   sudo ln -s /etc/nginx/sites-available/bankrollkings /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtain the cert with certbot AFTER DNS points here:
#   sudo certbot --nginx -d bankrollkings.com -d www.bankrollkings.com
# certbot rewrites the listen 80 blocks to add the 443 + redirect automatically,
# so you can install this HTTP-only version first, then run certbot.

# --- Redirect www -> apex (over HTTP; certbot upgrades to HTTPS) ---
server {
    listen 80;
    listen [::]:80;
    server_name www.bankrollkings.com;
    return 301 http://bankrollkings.com$request_uri;
}

# --- Main site ---
server {
    listen 80;
    listen [::]:80;
    server_name bankrollkings.com;

    # Uploads / request size headroom for form posts.
    client_max_body_size 8m;

    # Serve static assets straight from disk (skip the Python app entirely).
    location /static/ {
        alias /opt/bankrollkings/static/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Everything else proxies to gunicorn.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
